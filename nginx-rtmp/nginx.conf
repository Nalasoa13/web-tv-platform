worker_processes auto;
error_log logs/error.log debug;
events {
    worker_connections 1024;
}

http {
    include mime.types;
    default_type application/octet-stream;

    sendfile on;
    keepalive_timeout 65;

    # Configuration du serveur HTTP pour HLS
    server {
        listen 8080;
        server_name localhost;

        # Dossier des fichiers HLS
        location /hls {
            types {
                application/vnd.apple.mpegurl m3u8;
                video/mp2t ts;
            }
            alias /tmp/hls;
            expires -1;
            add_header Cache-Control "no-cache";
        }

        # Dossier des fichiers VOD
        location /vod {
            alias /home/ubuntu/web-tv-platform/vod;
            expires 30d;
            add_header Cache-Control "public";
        }

        # Proxy vers le backend Node.js
        location /api {
            proxy_pass http://localhost:3000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Proxy Socket.IO
        location /socket.io {
            proxy_pass http://localhost:3000/socket.io;
            proxy_http_version 1.1;
            proxy_buffering off;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Servir les fichiers statiques du frontend
        location / {
            root /home/ubuntu/web-tv-platform/frontend/dist;
            try_files $uri $uri/ /index.html;
        }
    }
}

rtmp {
    server {
        listen 1935;
        chunk_size 4096;

        # Application RTMP pour le streaming en direct
        application live {
            live on;
            record off;

            # Convertir RTMP en HLS
            exec ffmpeg -i rtmp://localhost:1935/live/$name
                -c:v libx264 -preset veryfast -b:v 3000k -maxrate 3000k -bufsize 6000k
                -c:a aac -b:a 128k -ac 2 -ar 44100
                -hls_time 10 -hls_list_size 6 -hls_flags delete_segments
                -f hls /tmp/hls/$name.m3u8;
        }

        # Application RTMP pour les replays
        application replay {
            live on;
            record all;
            record_path /home/ubuntu/web-tv-platform/recordings;
            record_suffix _%Y%m%d_%H%M%S.flv;
        }
    }
}
