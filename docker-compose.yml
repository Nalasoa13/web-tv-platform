version: '3.8'

services:
  # Base de données PostgreSQL
  postgres:
    image: postgres:15-alpine
    container_name: webtv-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: webtv
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - webtv-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend Node.js
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: webtv-backend
    environment:
      DB_USER: postgres
      DB_PASSWORD: password
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: webtv
      PORT: 3000
      JWT_SECRET: your-secret-key-change-in-production
      FRONTEND_URL: http://localhost:5173
      HLS_URL: http://localhost:8080/hls
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - webtv-network
    volumes:
      - ./backend/uploads:/app/uploads

  # Frontend React (optionnel en Docker)
  # frontend:
  #   build:
  #     context: ./frontend
  #     dockerfile: Dockerfile
  #   container_name: webtv-frontend
  #   ports:
  #     - "5173:5173"
  #   networks:
  #     - webtv-network

  # Nginx RTMP pour le streaming
  nginx:
    image: tiangolo/nginx-rtmp:latest
    container_name: webtv-nginx
    ports:
      - "1935:1935"
      - "8080:80"
    volumes:
      - ./nginx-rtmp/nginx.conf:/etc/nginx/nginx.conf
      - /tmp/hls:/tmp/hls
      - ./recordings:/home/ubuntu/web-tv-platform/recordings
      - ./vod:/home/ubuntu/web-tv-platform/vod
    depends_on:
      - backend
    networks:
      - webtv-network

volumes:
  postgres_data:

networks:
  webtv-network:
    driver: bridge
