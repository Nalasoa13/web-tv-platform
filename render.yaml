services:
  - type: web
    name: webtv-backend
    env: node
    plan: free
    buildCommand: cd backend && npm install --legacy-peer-deps
    startCommand: cd backend && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: JWT_SECRET
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: webtv-db
          property: connectionString
      - key: FRONTEND_URL
        value: https://webtv-rua.onrender.com
      - key: HLS_URL
        value: https://webtv-rua.onrender.com/hls

  - type: static
    name: webtv-frontend
    buildCommand: cd frontend && npm install --legacy-peer-deps && npm run build
    staticPublishPath: frontend/dist

databases:
  - name: webtv-db
    databaseName: webtv
    user: webtv_user
    plan: free
